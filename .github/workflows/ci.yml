name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  host-build:
    name: Host (C++20, x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++-14

      - name: Configure
        run: |
          cmake -B build/host -S host \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/host -j$(nproc)

      - name: Test
        run: ./build/host/tests/hydra-tests

  host-build-arm:
    name: Host (C++20, aarch64 cross)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++-14-aarch64-linux-gnu

      - name: Configure (cross-compile)
        run: |
          cmake -B build/host-arm -S host \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++-14 \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DBUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/host-arm -j$(nproc)

  mcu-build:
    name: MCU (RP2040, Pico SDK)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Pico SDK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git /tmp/pico-sdk
          cd /tmp/pico-sdk && git submodule update --init

      - name: Configure
        run: |
          cp /tmp/pico-sdk/external/pico_sdk_import.cmake mcu/pico_sdk_import.cmake
          cmake -B build/mcu -S mcu \
            -DPICO_SDK_PATH=/tmp/pico-sdk \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/mcu -j$(nproc)

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydra-mcu-firmware
          path: build/mcu/hydra-mcu.uf2

  ui-build:
    name: UI (React + TypeScript)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydra-ui-dist
          path: ui/dist

  lint:
    name: Lint (clang-format check)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting (host)
        run: |
          if [ -f .clang-format ]; then
            find host/src -name '*.cpp' -o -name '*.h' | head -50 | \
              xargs clang-format --dry-run --Werror 2>&1 || true
          fi
        continue-on-error: true
