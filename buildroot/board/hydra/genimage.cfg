image boot.vfat {
    vfat {
        files = {
            "bcm2712-rpi-cm5-cm5io.dtb",
            "Image",
            "config.txt",
            "cmdline.txt"
        }
    }
    size = 128M
}

image hydra-sdcard.img {
    hdimage {}

    partition boot {
        partition-type = 0xc
        bootable = "true"
        image = "boot.vfat"
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
        size = 2G
    }

    partition data {
        partition-type = 0x83
        size = 4G
    }
}
